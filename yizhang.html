<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>壹账</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --surface3: #e8e6de;
  --ink: #1a1814;
  --ink2: #4a4640;
  --ink3: #9a9690;
  --gold: #b8922a;
  --gold2: #d4aa4a;
  --gold-dim: rgba(184,146,42,0.12);
  --red: #c0432c;
  --red-dim: rgba(192,67,44,0.10);
  --green: #2e8a5a;
  --green-dim: rgba(46,138,90,0.10);
  --blue: #2e6aaa;
  --blue-dim: rgba(46,106,170,0.10);
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --radius: 14px;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-display: 'Playfair Display', serif;
  --font-mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}

/* ══ APP SHELL ══ */
.app {
  display: flex; flex-direction: column;
  height: 100vh; max-width: 430px; margin: 0 auto;
  position: relative; overflow: hidden;
}

/* ══ HEADER ══ */
.header {
  background: linear-gradient(180deg, #ffffff 0%, #f5f4f0 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 18px 0;
  flex-shrink: 0;
}

.header-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

.logo {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--ink);
  letter-spacing: 0.5px;
}
.logo em { color: var(--gold); font-style: normal; }

.month-nav { display: flex; align-items: center; gap: 8px; }
.month-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--ink2); width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.month-btn:hover { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
.month-display {
  font-family: var(--font-mono); font-size: 13px; color: var(--ink2);
  min-width: 72px; text-align: center;
}

/* Hero numbers */
.hero {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 0; padding-bottom: 16px;
}
.hero-item { text-align: center; padding: 8px 4px; }
.hero-item:nth-child(2) {
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
}
.hero-label { font-size: 10px; color: var(--ink3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 5px; }
.hero-val {
  font-family: var(--font-mono); font-size: 17px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-val.income { color: var(--green); }
.hero-val.spend { color: var(--red); }
.hero-val.surplus { }

/* ══ TABS ══ */
.tabs {
  display: flex; background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1; padding: 11px 4px; text-align: center;
  font-size: 11px; color: var(--ink3); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  letter-spacing: 0.3px; font-weight: 500;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ══ SCROLL AREA ══ */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* ══ SECTIONS ══ */
.section { display: none; padding: 14px; }
.section.active { display: block; }

/* ══ CARD ══ */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
}
.card-hd {
  padding: 13px 16px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border);
}
.card-title { font-size: 12px; color: var(--ink2); font-weight: 500; letter-spacing: 0.5px; }
.card-action { font-size: 11px; color: var(--gold); cursor: pointer; }
.card-body { padding: 14px 16px; }

/* ══ FORM ══ */
.type-switcher { display: flex; gap: 6px; margin-bottom: 16px; }
.type-btn {
  flex: 1; padding: 9px; text-align: center; border-radius: 9px;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  border: 1px solid var(--border2); color: var(--ink3); background: var(--surface2);
}
.type-btn.active.expense { background: var(--red-dim); border-color: var(--red); color: var(--red); }
.type-btn.active.income { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.type-btn.active.transfer { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.type-btn.active.repay { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { margin-bottom: 10px; }
.form-label { font-size: 10px; color: var(--ink3); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; padding: 10px 12px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 9px; color: var(--ink); font-size: 14px;
  font-family: var(--font-body); transition: border 0.2s;
  -webkit-appearance: none;
}
.form-input:focus { outline: none; border-color: var(--gold); }
.form-input::placeholder { color: var(--ink3); }
select.form-input { cursor: pointer; }
.form-input.amount-input {
  font-family: var(--font-mono); font-size: 22px; font-weight: 500;
  text-align: right; padding-right: 14px; letter-spacing: -0.5px;
}

.btn-submit {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: var(--font-body); letter-spacing: 0.3px; transition: opacity 0.2s;
  margin-top: 4px;
}
.btn-submit.expense { background: var(--red); color: #fff; }
.btn-submit.income { background: var(--green); color: #fff; }
.btn-submit.transfer { background: var(--blue); color: #fff; }
.btn-submit.repay { background: var(--gold); color: var(--bg); }
.btn-submit:hover { opacity: 0.88; }

/* ══ UPLOAD ZONE ══ */
.upload-zone {
  border: 1.5px dashed var(--border2); border-radius: 12px;
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: all 0.25s; background: var(--surface2); margin-bottom: 10px;
}
.upload-zone:hover, .upload-zone.drag {
  border-color: var(--gold); background: var(--gold-dim);
}
.upload-icon { font-size: 30px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--ink2); }
.upload-hint { font-size: 11px; color: var(--ink3); margin-top: 4px; }

.ai-loading { display: none; text-align: center; padding: 24px; }
.ai-loading.show { display: block; }
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--surface3);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ai-loading-text { font-size: 12px; color: var(--ink3); margin-top: 8px; }

.parsed-preview {
  background: var(--green-dim); border: 1px solid rgba(90,158,122,0.3);
  border-radius: 12px; padding: 14px; margin-bottom: 10px; display: none;
}
.parsed-preview.show { display: block; }
.parsed-tag { font-size: 10px; color: var(--green); font-weight: 500; letter-spacing: 0.6px; margin-bottom: 10px; }
.parsed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.parsed-field label { font-size: 10px; color: var(--ink3); display: block; margin-bottom: 3px; }
.parsed-field input, .parsed-field select {
  width: 100%; padding: 8px 10px; background: var(--surface);
  border: 1px solid rgba(90,158,122,0.3); border-radius: 7px;
  color: var(--ink); font-size: 13px; font-family: var(--font-mono);
}
.parsed-field.full { grid-column: 1/-1; }
.parsed-actions { display: flex; gap: 8px; margin-top: 10px; }
.btn-ok { flex: 1; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: var(--font-body); font-weight: 500; }
.btn-cancel { padding: 10px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; cursor: pointer; color: var(--ink3); font-family: var(--font-body); }

/* ══ TRANSACTIONS ══ */
.tx-group-label {
  font-size: 10px; color: var(--ink3); letter-spacing: 0.7px;
  text-transform: uppercase; padding: 10px 2px 6px;
}
.tx-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 11px;
  margin-bottom: 6px; transition: border-color 0.2s; cursor: default;
}
.tx-item:hover { border-color: var(--border2); }
.tx-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0;
}
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 10px; color: var(--ink3); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.tx-tag {
  background: var(--surface3); color: var(--ink3);
  font-size: 9px; padding: 1px 5px; border-radius: 4px; letter-spacing: 0.3px;
}
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-family: var(--font-mono); font-size: 14px; font-weight: 500; }
.tx-amount.expense { color: var(--red); }
.tx-amount.income { color: var(--green); }
.tx-amount.transfer { color: var(--blue); }
.tx-amount.repay { color: var(--gold); }
.tx-acc-label { font-size: 10px; color: var(--ink3); margin-top: 2px; }

/* ══ SUMMARY ══ */
.sum-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.sum-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; text-align: center;
}
.sum-card.full { grid-column: 1/-1; }
.sum-card-label { font-size: 10px; color: var(--ink3); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 6px; }
.sum-card-val { font-family: var(--font-mono); font-size: 20px; font-weight: 500; }
.sum-card-val.income { color: var(--green); }
.sum-card-val.spend { color: var(--red); }
.sum-card-val.surplus.pos { color: var(--green); }
.sum-card-val.surplus.neg { color: var(--red); }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-name { font-size: 11px; color: var(--ink2); width: 64px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 3px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
.bar-val { font-family: var(--font-mono); font-size: 10px; color: var(--ink3); width: 52px; text-align: right; flex-shrink: 0; }

/* ══ ACCOUNTS ══ */
.net-worth-banner {
  background: linear-gradient(135deg, #1a1814 0%, #2c2820 100%);
  border: 1px solid rgba(0,0,0,0.15); border-radius: var(--radius);
  padding: 18px 20px; margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.nwb-label { font-size: 11px; color: var(--ink3); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 6px; }
.nwb-val { font-family: var(--font-mono); font-size: 26px; font-weight: 500; color: var(--gold2); }
.nwb-right { text-align: right; }
.nwb-accounts { font-size: 12px; color: var(--ink3); }
.nwb-accounts span { font-family: var(--font-mono); color: var(--ink2); font-size: 16px; }

.bank-group-label {
  font-size: 10px; color: var(--ink3); letter-spacing: 0.8px;
  text-transform: uppercase; padding: 8px 2px 5px;
}

.acc-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 15px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 12px; transition: border-color 0.2s;
}
.acc-item:hover { border-color: var(--border2); }
.acc-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.acc-info { flex: 1; min-width: 0; }
.acc-name { font-size: 13px; font-weight: 500; }
.acc-sub { font-size: 10px; color: var(--ink3); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
.acc-badge {
  font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 500;
}
.acc-badge.bank { background: var(--blue-dim); color: var(--blue); }
.acc-badge.virtual { background: var(--green-dim); color: var(--green); }
.acc-badge.credit { background: var(--red-dim); color: var(--red); }
.acc-badge.deposit { background: var(--gold-dim); color: var(--gold); }
.acc-badge.cpf { background: rgba(180,120,200,0.15); color: #b478c8; }
.acc-badge.loan { background: rgba(180,100,100,0.15); color: #d47878; }

.acc-right { text-align: right; flex-shrink: 0; }
.acc-balance { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
.acc-balance.positive { color: var(--ink); }
.acc-balance.negative { color: var(--red); }
.acc-balance.cpf { color: #b478c8; }
.acc-sgd-equiv { font-size: 10px; color: var(--ink3); margin-top: 2px; }
.acc-maturity { font-size: 10px; color: var(--gold); margin-top: 2px; }

.btn-add-acc {
  width: 100%; padding: 12px; background: transparent;
  border: 1.5px dashed var(--border2); border-radius: 11px;
  color: var(--ink3); font-size: 13px; cursor: pointer; font-family: var(--font-body);
  transition: all 0.2s; margin-top: 4px;
}
.btn-add-acc:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* ══ MODAL ══ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border2); border-bottom: none;
  width: 100%; max-width: 430px; padding: 22px 18px 36px;
  animation: slideUp 0.28s ease; max-height: 85vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-family: var(--font-display); font-size: 18px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: var(--surface3); border: none; color: var(--ink2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; }

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(50px);
  background: #1a1814; border: none;
  color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: 13px; z-index: 999; transition: transform 0.3s ease;
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ══ EMPTY ══ */
.empty { text-align: center; padding: 36px 20px; color: var(--ink3); }
.empty-icon { font-size: 32px; margin-bottom: 10px; }
.empty-text { font-size: 12px; line-height: 1.7; }

/* Category colors */
.cat-food { background: rgba(255,160,80,0.15); }
.cat-transport { background: rgba(74,126,181,0.15); }
.cat-shopping { background: rgba(180,100,200,0.15); }
.cat-health { background: rgba(90,158,122,0.15); }
.cat-entertainment { background: rgba(212,97,74,0.15); }
.cat-education { background: rgba(74,126,181,0.12); }
.cat-home { background: rgba(201,168,76,0.15); }
.cat-other { background: var(--surface3); }
.cat-salary { background: rgba(90,158,122,0.2); }
.cat-interest { background: rgba(201,168,76,0.2); }
.cat-cpf { background: rgba(180,120,200,0.2); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-row1">
      <div class="logo">壹<em>账</em></div>
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-display" id="monthDisplay">2026-04</div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="hero">
      <div class="hero-item">
        <div class="hero-label">收入</div>
        <div class="hero-val income" id="hIncome">$0</div>
      </div>
      <div class="hero-item">
        <div class="hero-label">支出</div>
        <div class="hero-val spend" id="hSpend">$0</div>
      </div>
      <div class="hero-item">
        <div class="hero-label">结余</div>
        <div class="hero-val" id="hSurplus">$0</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="goTab('record')">📝 记账</div>
    <div class="tab" onclick="goTab('history')">📋 明细</div>
    <div class="tab" onclick="goTab('summary')">📊 月报</div>
    <div class="tab" onclick="goTab('accounts')">🏦 账户</div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- ══ RECORD ══ -->
    <div class="section active" id="tab-record">

      <!-- Entry type -->
      <div class="card">
        <div class="card-body" style="padding-bottom:6px;">
          <div class="type-switcher">
            <div class="type-btn active expense" data-type="expense" onclick="setType('expense')">支出</div>
            <div class="type-btn income" data-type="income" onclick="setType('income')">收入</div>
            <div class="type-btn repay" data-type="repay" onclick="setType('repay')">还款</div>
            <div class="type-btn transfer" data-type="transfer" onclick="setType('transfer')">转账</div>
          </div>

          <!-- Amount -->
          <div class="form-group">
            <label class="form-label">金额</label>
            <div style="display:flex;gap:8px;align-items:center;">
              <select class="form-input" id="f-currency" style="width:80px;padding:10px 8px;">
                <option value="SGD">SGD</option>
                <option value="CNY">CNY</option>
                <option value="USD">USD</option>
              </select>
              <input class="form-input amount-input" id="f-amount" type="number" step="0.01" placeholder="0.00">
            </div>
          </div>

          <div class="form-grid2">
            <div class="form-group">
              <label class="form-label">描述</label>
              <input class="form-input" id="f-desc" type="text" placeholder="如：牛车水饮茶">
            </div>
            <div class="form-group">
              <label class="form-label">日期</label>
              <input class="form-input" id="f-date" type="date">
            </div>
          </div>

          <div class="form-grid2" id="f-cat-row">
            <div class="form-group">
              <label class="form-label">类别</label>
              <select class="form-input" id="f-cat">
                <option value="food">🍜 餐饮</option>
                <option value="social">🥂 社交娱乐</option>
                <option value="transport">🚗 交通</option>
                <option value="shopping">🛍️ 购物</option>
                <option value="family">🏠 家庭</option>
                <option value="insurance">🛡️ 保险</option>
                <option value="health">💊 医疗</option>
                <option value="wellness">🧘 Wellness</option>
                <option value="education">📚 教育学习</option>
                <option value="advance">🔄 垫付报账</option>
                <option value="other">📦 其他</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" id="f-acc-label">账户</label>
              <select class="form-input" id="f-account"></select>
            </div>
          </div>

          <div class="form-group" id="f-acc2-row" style="display:none;">
            <label class="form-label">转入账户</label>
            <select class="form-input" id="f-account2"></select>
          </div>

          <div class="form-group" id="f-notes-row">
            <label class="form-label">备注（可选）</label>
            <input class="form-input" id="f-notes" type="text" placeholder="如：朱总餐费代缴、展会门票...">
          </div>

          <div class="form-group" id="f-income-cat-row" style="display:none;">
            <label class="form-label">收入类别</label>

let S = {

// Default accounts
const DEFAULT_ACCOUNTS = [

  { id:'cpf-sa',        name:'CPF SA',          bank:'CPF',       type:'cpf',     currency:'SGD', balance:0, icon:'🏛️' },
  // 微信
  { id:'wechat-p',      name:'微信 (个人)',      bank:'WeChat',    type:'virtual', currency:'CNY', balance:0, icon:'💚' },
  { id:'wechat-w',      name:'微信 (工作)',      bank:'WeChat',    type:'virtual', currency:'CNY', balance:0, icon:'💚' },
  // 支付宝
  { id:'alipay-p',      name:'支付宝 (个人)',    bank:'Alipay',    type:'virtual', currency:'CNY', balance:0, icon:'🔷' },

  { id:'starbucks',     name:'Starbucks Card',  bank:'Starbucks', type:'virtual', currency:'SGD', balance:0, icon:'☕' },
  { id:'coffeebean',    name:'Coffee Bean Card',bank:'CoffeeBean',type:'virtual', currency:'SGD', balance:0, icon:'🫘' },

// ════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════
async function loadData() {
  try {
    const accs = localStorage.getItem('yizhang-accounts');
    const txs  = localStorage.getItem('yizhang-transactions');
    S.accounts     = accs ? JSON.parse(accs) : DEFAULT_ACCOUNTS;
    S.transactions = txs  ? JSON.parse(txs)  : [];
  } catch {
    S.accounts = DEFAULT_ACCOUNTS;
    S.transactions = [];
  }
}

async function saveData() {
  try {
    localStorage.setItem('yizhang-accounts',     JSON.stringify(S.accounts));
    localStorage.setItem('yizhang-transactions', JSON.stringify(S.transactions));
  } catch(e) { console.error('Storage error', e); }
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function goTab(tab) {
  S.currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['record','history','summary','accounts'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}

function changeMonth(d) {
  const [y,m] = S.currentMonth.split('-').map(Number);
  const nd = new Date(y, m-1+d, 1);
  S.currentMonth = nd.toISOString().slice(0,7);
  renderAll();
}

// ════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════
function renderAll() {
  document.getElementById('monthDisplay').textContent = S.currentMonth;
  updateHeader();
  renderRecentList();
  renderHistory();
  renderSummary();
  renderAccounts();
}

// ════════════════════════════════════════
// HEADER STATS
// ════════════════════════════════════════
function toSGD(amount, currency) { return amount * (FX[currency] || 1); }

function getMonthTxs() {
  return S.transactions.filter(t => t.date.startsWith(S.currentMonth));
}

function updateHeader() {
  const txs = getMonthTxs();
  const income = txs.filter(t => t.type === 'income').reduce((s,t) => s + toSGD(t.amount, t.currency||'SGD'), 0);
  const spend  = txs.filter(t => t.type === 'expense').reduce((s,t) => s + toSGD(t.amount, t.currency||'SGD'), 0);
  const surplus = income - spend;

  document.getElementById('hIncome').textContent  = '$' + income.toFixed(0);
  document.getElementById('hSpend').textContent   = '$' + spend.toFixed(0);
  const sel = document.getElementById('hSurplus');
  sel.textContent = (surplus >= 0 ? '+' : '') + '$' + surplus.toFixed(0);
  sel.style.color = surplus >= 0 ? 'var(--green)' : 'var(--red)';
}

// ════════════════════════════════════════
// FORM — TYPE SWITCHER
// ════════════════════════════════════════
function setType(type) {
  S.currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  const submitBtn = document.getElementById('f-submit');
  submitBtn.className = 'btn-submit ' + type;
  submitBtn.textContent = '记录' + TYPE_LABELS[type];

  // Show/hide income category
  document.getElementById('f-income-cat-row').style.display = type === 'income' ? 'block' : 'none';
  document.getElementById('f-cat-row').style.display = (type === 'expense') ? 'flex' : 'none';
  document.getElementById('f-acc2-row').style.display = type === 'transfer' ? 'block' : 'none';

  const accLabel = document.getElementById('f-acc-label');
  accLabel.textContent = type === 'repay' ? '信用卡账户' : (type === 'transfer' ? '转出账户' : '账户');
}

// ════════════════════════════════════════
// ACCOUNT SELECTS
// ════════════════════════════════════════
function accOption(a) {
  return `<option value="${a.id}">${a.icon} ${a.name} (${a.currency})</option>`;
}

function populateAccSelects() {
  const opts = S.accounts.map(accOption).join('');
  ['f-account','f-account2','p-acc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = opts;
  });
}

// ════════════════════════════════════════
// SUBMIT ENTRY
// ════════════════════════════════════════
function submitEntry() {
  const amount = parseFloat(document.getElementById('f-amount').value);
  const currency = document.getElementById('f-currency').value;
  const desc = document.getElementById('f-desc').value.trim();
  const date = document.getElementById('f-date').value;
  const type = S.currentType;

  if (!amount || amount <= 0 || !desc || !date) { showToast('请填写完整信息'); return; }

  const cat = type === 'income'
    ? document.getElementById('f-income-cat').value
    : (type === 'expense' ? document.getElementById('f-cat').value : type);

  const accId = document.getElementById('f-account').value;
  const acc2Id = document.getElementById('f-account2').value;

  const notes = document.getElementById('f-notes').value.trim();

  const tx = {
    id: 'tx' + Date.now(),
    date, desc, amount, currency, type, cat,
    account: accId,
    account2: type === 'transfer' ? acc2Id : null,
    notes: notes || '',
  };

  S.transactions.unshift(tx);

  // Update account balances
  const acc = S.accounts.find(a => a.id === accId);
  if (acc) {
    if (type === 'expense' || type === 'repay') acc.balance -= amount;
    else if (type === 'income') acc.balance += amount;
    else if (type === 'transfer') {
      acc.balance -= amount;
      const acc2 = S.accounts.find(a => a.id === acc2Id);
      if (acc2) {
        // Simple: add same amount (fx conversion ignored for simplicity)
        acc2.balance += amount;
      }
    }
  }

  // Reset form
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-notes').value = '';

  saveData();
  showToast('✅ ' + TYPE_LABELS[type] + '已记录');
  renderAll();
}

function doDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag'); }
function doDragLeave()  { document.getElementById('uploadZone').classList.remove('drag'); }
function doDrop(e) { e.preventDefault(); doDragLeave(); const f = e.dataTransfer.files[0]; if(f) processFile(f); }
function handleFileInput(e) { const f = e.target.files[0]; if(f) processFile(f); }

async function processFile(file) {
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('parsedPreview').classList.remove('show');
  document.getElementById('aiLoading').classList.add('show');
  try {
    const b64 = await fileToB64(file);
    const result = await callVision(b64, file.type);
    showParsed(result);
  } catch(e) {
    showToast('识别失败，请重试');
    document.getElementById('uploadZone').style.display = '';
  }
  document.getElementById('aiLoading').classList.remove('show');
}

function fileToB64(file) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function callVision(b64, mtype) {
  const today = new Date().toISOString().slice(0,10);
  const prompt = `你是账单识别助手。从截图中提取信息，只返回JSON，不要任何其他文字：
{"amount":数字,"currency":"SGD/CNY/USD之一","date":"YYYY-MM-DD，没有用${today}","desc":"简洁描述如Grab乌节路→家","cat":"transport/food/shopping/health/other之一"}
注意：Grab/Tada/ComfortDelGro是transport；餐厅/咖啡是food。今天：${today}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mtype, data: b64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  const data = await resp.json();
  const text = data.content.map(c => c.text||'').join('').replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

function showParsed(data) {
  S.parsedData = data;
  document.getElementById('p-amount').value = data.amount || '';
  document.getElementById('p-currency').value = data.currency || 'SGD';
  document.getElementById('p-date').value = data.date || new Date().toISOString().slice(0,10);
  document.getElementById('p-desc').value = data.desc || '';
  document.getElementById('p-cat').value = data.cat || 'transport';
  document.getElementById('parsedPreview').classList.add('show');
}

function cancelParsed() {
  document.getElementById('parsedPreview').classList.remove('show');
  document.getElementById('uploadZone').style.display = '';
  document.getElementById('fileInput').value = '';
}

function confirmParsed() {
  const amount = parseFloat(document.getElementById('p-amount').value);
  const currency = document.getElementById('p-currency').value;
  const desc = document.getElementById('p-desc').value.trim();
  const date = document.getElementById('p-date').value.slice(0,10);
  const cat = document.getElementById('p-cat').value;
  const accId = document.getElementById('p-acc').value;

  if (!amount || !desc) { showToast('请检查金额和描述'); return; }

  const tx = { id: 'tx'+Date.now(), date, desc, amount, currency, type:'expense', cat, account: accId };
  S.transactions.unshift(tx);
  const acc = S.accounts.find(a => a.id === accId);
  if (acc) acc.balance -= amount;

  cancelParsed();
  saveData();
  showToast('✅ 截图记录成功');
  renderAll();
}

// ════════════════════════════════════════
// RENDER TRANSACTIONS
// ════════════════════════════════════════
function txHtml(tx) {
  const cat = CAT_CFG[tx.cat] || CAT_CFG.other;
  const acc = S.accounts.find(a => a.id === tx.account);
  const cur = tx.currency || 'SGD';
  const sign = tx.type === 'income' ? '+' : (tx.type === 'transfer' ? '↔' : '-');
  const amtClass = tx.type;
  const curSym = cur === 'SGD' ? '$' : cur === 'CNY' ? '¥' : 'US$';
  const notesText = tx.notes ? `<span style="color:var(--ink3);font-size:10px;"> · ${tx.notes}</span>` : '';
  return `<div class="tx-item">
    <div class="tx-icon cat-${tx.cat}">${cat.icon}</div>
    <div class="tx-info">
      <div class="tx-desc">${tx.desc}</div>
      <div class="tx-meta">
        ${fmtDate(tx.date)}
        <span class="tx-tag">${cat.label}</span>
        ${notesText}
      </div>
    </div>
    <div class="tx-right">
      <div class="tx-amount ${amtClass}">${sign}${curSym}${tx.amount.toFixed(2)}</div>
      <div class="tx-acc-label">${acc ? acc.icon+' '+acc.name.replace('账户','').replace('个人','').replace('信用卡','CC').trim() : '-'}</div>
    </div>
  </div>`;
}

function renderRecentList() {
  const el = document.getElementById('recentList');
  const recent = S.transactions.slice(0,4);
  el.innerHTML = recent.length
    ? recent.map(txHtml).join('')
    : '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">还没有记录<br>开始记录你的第一笔吧</div></div>';
}

function renderHistory() {
  const el = document.getElementById('historyList');
  const txs = S.transactions.filter(t => t.date.startsWith(S.currentMonth));
  if (!txs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">本月暂无记录</div></div>';
    return;
  }
  const groups = {};
  txs.forEach(t => { if (!groups[t.date]) groups[t.date]=[]; groups[t.date].push(t); });
  const dates = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  el.innerHTML = dates.map(d => `
    <div class="tx-group-label">${fmtDate(d)}</div>
    ${groups[d].map(txHtml).join('')}
  `).join('');
}

// ════════════════════════════════════════
// RENDER SUMMARY
// ════════════════════════════════════════
function renderSummary() {
  const txs = getMonthTxs();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+toSGD(t.amount,t.currency||'SGD'),0);
  const spend  = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+toSGD(t.amount,t.currency||'SGD'),0);
  const surplus = income - spend;

  document.getElementById('s-income').textContent  = '$' + income.toFixed(2);
  document.getElementById('s-spend').textContent   = '$' + spend.toFixed(2);
  const surEl = document.getElementById('s-surplus');
  surEl.textContent = (surplus>=0?'+':'') + '$' + surplus.toFixed(2);
  surEl.className = 'sum-card-val surplus ' + (surplus>=0?'pos':'neg');

  // Expense cats
  const catTotals = {};
  txs.filter(t=>t.type==='expense').forEach(t => {
    catTotals[t.cat] = (catTotals[t.cat]||0) + toSGD(t.amount,t.currency||'SGD');
  });
  renderBarChart('s-cats', catTotals, '#d4614a');

  // Income cats
  const incomeTotals = {};
  txs.filter(t=>t.type==='income').forEach(t => {
    incomeTotals[t.cat] = (incomeTotals[t.cat]||0) + toSGD(t.amount,t.currency||'SGD');
  });
  renderBarChart('s-income-cats', incomeTotals, '#5a9e7a');

  // Account usage
  const accTotals = {};
  txs.filter(t=>t.type==='expense').forEach(t => {
    accTotals[t.account] = (accTotals[t.account]||0) + toSGD(t.amount,t.currency||'SGD');
  });
  const accLabeled = {};
  Object.entries(accTotals).forEach(([id,v]) => {
    const a = S.accounts.find(x=>x.id===id);
    accLabeled[a ? a.icon+' '+a.name.slice(0,8) : id] = v;
  });
  renderBarChart('s-accs', accLabeled, '#c9a84c');
}

function renderBarChart(elId, data, color) {
  const el = document.getElementById(elId);
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) { el.innerHTML = '<div style="color:var(--ink3);font-size:12px;text-align:center;padding:8px 0;">暂无数据</div>'; return; }
  const max = entries[0][1];
  el.innerHTML = entries.map(([k,v]) => {
    const cfg = CAT_CFG[k];
    const label = cfg ? cfg.icon + ' ' + cfg.label : k;
    const pct = (v/max*100).toFixed(0);
    return `<div class="bar-row">
      <div class="bar-name">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cfg?cfg.color:color};"></div></div>
      <div class="bar-val">$${v.toFixed(0)}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
// RENDER ACCOUNTS
// ════════════════════════════════════════
function renderAccounts() {
  // Net worth = all non-loan, non-credit balances converted to SGD
  let net = 0;
  S.accounts.forEach(a => {
    const sgd = toSGD(a.balance, a.currency);
    if (a.type === 'loan') net -= sgd;
    else if (a.type === 'credit') net -= (a.balance > 0 ? sgd : 0);
    else net += sgd;
  });
  document.getElementById('netWorth').textContent = '$' + net.toFixed(0);
  document.getElementById('accCount').textContent = S.accounts.length;

  // Group by bank
  const groups = {};
  S.accounts.forEach(a => {
    if (!groups[a.bank]) groups[a.bank] = [];
    groups[a.bank].push(a);
  });

  const bankOrder = ['DBS','OCBC','UOB','CPF','Grab','WeChat','Alipay','Starbucks','CoffeeBean','Other'];
  const el = document.getElementById('accList');
  el.innerHTML = bankOrder.filter(b => groups[b]).map(b => {
    const accs = groups[b];
    return `<div class="bank-group-label">${BANK_ICONS[b]||''} ${b}</div>
      ${accs.map(accHtml).join('')}`;
  }).join('');
}

function accHtml(a) {
  const badgeClass = a.type;
  const badgeLabel = {bank:'银行',deposit:'定存',credit:'信用卡',loan:'贷款',virtual:'虚拟',cpf:'CPF'}[a.type]||a.type;
  const curSym = a.currency==='SGD'?'$':a.currency==='CNY'?'¥':'US$';
  const balClass = a.type==='cpf'?'cpf':(a.balance<0?'negative':'positive');
  const sgdEquiv = a.currency!=='SGD' ? `<div class="acc-sgd-equiv">≈ SGD ${toSGD(a.balance,a.currency).toFixed(0)}</div>` : '';
  const maturity = a.maturity ? `<div class="acc-maturity">📅 到期 ${a.maturity}</div>` : '';
  return `<div class="acc-item" data-acc-id="${a.id}" style="cursor:pointer;">
    <div class="acc-icon" style="background:var(--surface2)">${a.icon}</div>
    <div class="acc-info">
      <div class="acc-name">${a.name}</div>
      <div class="acc-sub">
        <span class="acc-badge ${badgeClass}">${badgeLabel}</span>
        ${a.currency}
      </div>
    </div>
    <div class="acc-right">
      <div class="acc-balance ${balClass}">${curSym}${Math.abs(a.balance).toFixed(2)}</div>
      ${sgdEquiv}${maturity}
      <div style="font-size:10px;color:var(--ink3);margin-top:3px;">点击编辑 ✏️</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
// ADD ACCOUNT MODAL
// ════════════════════════════════════════
function showAddAcc() { document.getElementById('addAccOverlay').classList.add('show'); }
function closeModal()  { document.getElementById('addAccOverlay').classList.remove('show'); }

function saveNewAcc() {
  const name = document.getElementById('na-name').value.trim();
  const bank = document.getElementById('na-bank').value;
  const type = document.getElementById('na-type').value;
  const currency = document.getElementById('na-currency').value;
  const balance = parseFloat(document.getElementById('na-balance').value) || 0;
  const maturity = document.getElementById('na-maturity').value;
  const icon = document.getElementById('na-icon').value.trim() || BANK_ICONS[bank] || '🏦';

  if (!name) { showToast('请输入账户名称'); return; }

  const acc = { id: 'acc'+Date.now(), name, bank, type, currency, balance, icon };
  if (maturity) acc.maturity = maturity;
  S.accounts.push(acc);

  closeModal();
  populateAccSelects();
  saveData();
  renderAll();
  showToast('✅ 账户已添加');
}

// ════════════════════════════════════════
// EDIT ACCOUNT
// ════════════════════════════════════════
function openEditAcc(id) {
  const a = S.accounts.find(x => x.id === id);
  if (!a) return;
  document.getElementById('ea-id').value = id;
  document.getElementById('ea-name').value = a.name;
  document.getElementById('ea-balance').value = a.balance;
  document.getElementById('ea-currency').value = a.currency;
  document.getElementById('ea-icon').value = a.icon;
  document.getElementById('ea-maturity').value = a.maturity || '';
  document.getElementById('ea-maturity-row').style.display = a.type === 'deposit' ? 'block' : 'none';
  document.getElementById('editAccOverlay').classList.add('show');
}

function closeEditModal() {
  document.getElementById('editAccOverlay').classList.remove('show');
}

function saveEditAcc() {
  const id = document.getElementById('ea-id').value;
  const a = S.accounts.find(x => x.id === id);
  if (!a) return;
  a.name     = document.getElementById('ea-name').value.trim() || a.name;
  a.balance  = parseFloat(document.getElementById('ea-balance').value) || 0;
  a.currency = document.getElementById('ea-currency').value;
  a.icon     = document.getElementById('ea-icon').value.trim() || a.icon;
  a.maturity = document.getElementById('ea-maturity').value || '';
  closeEditModal();
  populateAccSelects();
  saveData();
  renderAll();
  showToast('✅ 账户已更新');
}

function deleteAcc() {
  const id = document.getElementById('ea-id').value;
  const a = S.accounts.find(x => x.id === id);
  if (!a) return;
  if (!confirm(`确认删除「${a.name}」？`)) return;
  S.accounts = S.accounts.filter(x => x.id !== id);
  closeEditModal();
  populateAccSelects();
  saveData();
  renderAll();
  showToast('已删除账户');
}

// ════════════════════════════════════════
// EVENT DELEGATION — all dynamic click handlers
// ════════════════════════════════════════
document.addEventListener('click', function(e) {
  // Account item click → open edit modal
  const accItem = e.target.closest('[data-acc-id]');
  if (accItem) { openEditAcc(accItem.dataset.accId); return; }

  // Overlay backgrounds → close modals
  if (e.target.id === 'addAccOverlay') { closeModal(); return; }
  if (e.target.id === 'editAccOverlay') { closeEditModal(); return; }
});

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  return `${dt.getMonth()+1}月${dt.getDate()}日 周${days[dt.getDay()]}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ════════════════════════════════════════
// START
// ════════════════════════════════════════
function init() {
  loadData().then(() => {
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
    populateAccSelects();
    renderAll();

    // Static button wiring (avoids inline onclick scope issues in iframes)
    document.querySelectorAll('.month-btn').forEach((btn, i) => {
      btn.addEventListener('click', () => changeMonth(i === 0 ? -1 : 1));
    });
    document.querySelectorAll('.tab').forEach((tab, i) => {
      tab.addEventListener('click', () => goTab(['record','history','summary','accounts'][i]));
    });
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => setType(btn.dataset.type));
    });
    document.getElementById('f-submit').addEventListener('click', submitEntry);
    document.getElementById('f-submit').removeAttribute('onclick');

    document.querySelector('.card-action').addEventListener('click', () => goTab('history'));

    document.querySelector('.btn-add-acc').addEventListener('click', showAddAcc);

    // Modal close buttons
    document.querySelectorAll('.modal-close').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('addAccOverlay').classList.remove('show');
        document.getElementById('editAccOverlay').classList.remove('show');
      });
    });

    // Add account save
    document.querySelector('#addAccOverlay .btn-submit').addEventListener('click', saveNewAcc);
    // Edit account save & delete
    document.querySelector('#editAccOverlay .btn-submit').addEventListener('click', saveEditAcc);
    document.querySelector('#editAccOverlay button:last-of-type').addEventListener('click', deleteAcc);

    // Screenshot buttons
    document.getElementById('uploadZone').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('uploadZone').removeAttribute('onclick');
    document.getElementById('fileInput').addEventListener('change', handleFileInput);
    document.getElementById('fileInput').removeAttribute('onchange');
    document.getElementById('uploadZone').addEventListener('dragover', doDragOver);
    document.getElementById('uploadZone').addEventListener('drop', doDrop);
    document.getElementById('uploadZone').addEventListener('dragleave', doDragLeave);
    document.getElementById('uploadZone').removeAttribute('ondragover');
    document.getElementById('uploadZone').removeAttribute('ondrop');
    document.getElementById('uploadZone').removeAttribute('ondragleave');

    document.querySelector('.btn-cancel').addEventListener('click', cancelParsed);
    document.querySelector('.btn-ok').addEventListener('click', confirmParsed);

    // na-type maturity toggle
    document.getElementById('na-type').addEventListener('change', function() {
      document.getElementById('na-maturity-row').style.display =
        this.value === 'deposit' ? 'block' : 'none';
    });
  });
}
init();
</script>
